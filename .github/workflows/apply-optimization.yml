name: Materialize optimized source

on:
  push:
    branches: [main]
    paths:
      - ".payload/**"
      - "scripts/materialize-optimization.sh"
      - ".github/workflows/apply-optimization.yml"

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply optimized source
        run: bash scripts/materialize-optimization.sh

      - name: Commit materialized files
        run: |
          rm -rf .patches .payload .github/workflows/apply-optimization.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Materialize optimized resume builder [skip ci]"
          git push
